<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Status | GitHub Red</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --accent-red: #f85149;
            --border-color: #30363d;
            --online-green: #3fb950;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Top Navigation / Profile Header */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--accent-red);
            padding: 8px 15px;
            border-radius: 6px;
        }

        .profile-card img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid var(--accent-red);
        }

        .profile-info {
            font-size: 0.85rem;
        }

        .profile-info b {
            display: block;
            color: var(--accent-red);
        }

        /* Main Content */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            color: var(--accent-red);
        }

        .status-container {
            margin-top: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-row:last-child {
            border-bottom: none;
        }

        .status-indicator {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .online { background-color: var(--online-green); box-shadow: 0 0 5px var(--online-green); }
        .offline { background-color: #484f58; }

        .email-label {
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

<header>
    <div class="profile-card">
        <img src="https://github.com/identicons/jedi.png" alt="Profile">
        <div class="profile-info">
            <b>Your Name</b>
            <span>user@example.com</span>
        </div>
    </div>
</header>

<main>
    <h1>Active Network Users</h1>
    <div class="status-container" id="user-list">
        </div>
</main>

<script>
    // List of emails to track
    const trackedUsers = [
        { email: "208419@jcpsnj.org", name: "User 208419" },
        { email: "207737@jcpsnj.org", name: "User 207737" },
        { email: "208647@jcpsnj.org", name: "User 208647" }
    ];

    function checkOnlineStatus() {
        const container = document.getElementById('user-list');
        container.innerHTML = '';

        trackedUsers.forEach(user => {
            // MOCK LOGIC: In a real app, this would be a fetch() to a server
            // checking last_active_timestamp from a database.
            const isOnline = Math.random() > 0.5; 

            const row = document.createElement('div');
            row.className = 'user-row';
            
            row.innerHTML = `
                <div>
                    <span class="status-indicator ${isOnline ? 'online' : 'offline'}"></span>
                    <strong>${user.name}</strong>
                </div>
                <span class="email-label">${user.email}</span>
            `;
            
            container.appendChild(row);
        });
    }

    // Run on load
    checkOnlineStatus();

    // Refresh status every 10 seconds
    setInterval(checkOnlineStatus, 10000);
</script>

</body>
</html>
